{% extends 'store/base.html' %}

{% block title %}Contact Us - Bervado{% endblock %}

{% block content %}
<div class="container fade-in">
    <h1 class="section-title">Customer Care</h1>
    <div style="max-width: 600px; margin: 0 auto; background: var(--color-white); padding: 40px; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.03);">
        <p style="text-align: center; margin-bottom: 30px; color: var(--color-olive);">
            Have a question about a product, order, or styling advice? We're here to assist you.
        </p>
        <form action="#" method="post">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" class="form-control" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Send Message</button>
        </form>
    </div>
</div>
{% endblock %}
