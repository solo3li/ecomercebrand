{% extends 'store/base.html' %}

{% block title %}Checkout - Bervado{% endblock %}

{% block content %}
<div class="container fade-in">
    <h1 class="section-title">Checkout</h1>
    
    <!-- Stepper System -->
    <div class="stepper-wrapper">
        <div class="stepper-item active">
            <div class="step-counter">1</div>
            <div class="step-name">Checkout</div>
        </div>
        <div class="stepper-item">
            <div class="step-counter">2</div>
            <div class="step-name">Placed</div>
        </div>
        <div class="stepper-item">
            <div class="step-counter">3</div>
            <div class="step-name">Shipped</div>
        </div>
        <div class="stepper-item">
            <div class="step-counter">4</div>
            <div class="step-name">Delivered</div>
        </div>
    </div>

    <div style="max-width: 600px; margin: 0 auto; background: var(--color-white); padding: 40px; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.03);">
        <form method="post">
            {% csrf_token %}
            <h3 style="margin-bottom: 20px;">Shipping Information</h3>
            
            <div class="form-group">
                <label for="address">Street Address</label>
                <input type="text" id="address" name="address" class="form-control" required>
            </div>
            
            <div style="display: flex; gap: 20px;">
                <div class="form-group" style="flex: 1;">
                    <label for="city">City</label>
                    <input type="text" id="city" name="city" class="form-control" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label for="postal_code">Postal Code</label>
                    <input type="text" id="postal_code" name="postal_code" class="form-control" required>
                </div>
            </div>
            
            <div style="margin-top: 30px;">
                <button type="submit" class="btn btn-primary" style="width: 100%;">Place Order</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
